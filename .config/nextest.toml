[profile.default]
# TEMPORARY: timeout at 10s while the 100% coverage quest finishes.
# The 100ms default is too tight for subprocess-spawning tests
# running under cargo-llvm-cov — each test's `.profraw` flush plus
# macOS kqueue child-reaper lag for spawned `git` subprocesses push
# the post-test cleanup tail over the default window under parallel
# load, producing flaky LEAK-FAIL results that move between tests.
# 2s was observed insufficient (retry_spawn_failure measured 2.273s
# after 5 git subprocesses in init_git_repo). Revisit after the
# coverage quest: either restore 100ms after refactoring
# subprocess-spawning tests to call `run_impl` directly, or pin
# the offending binaries to a serial test-group.
leak-timeout = { period = "10s", result = "fail" }

# Slow-test gate. Any test exceeding the period is marked SLOW and
# immediately terminated (`terminate-after = 1` = kill after one
# period of slow-timeout). The termination surfaces as a test
# failure, and nextest's default fail-fast halts the entire run on
# that failure — so `bin/flow ci` stops at the first slow test
# rather than running the full suite to completion.
#
# The test's FAIL line carries its actual wall-clock duration,
# which is the information the user needs to triage.
#
# Complementary to the full-suite wall-time gate (6 min) that
# `bin/test` enforces separately. No per-file gate — per-test
# discipline at this granularity subsumes a file-level limit.
#
# TEMPORARY: period set to 45s while the existing slow-test
# backlog is worked down. The slowest current test runs at ~37s
# (`prime_setup settings_has_all_universal_allow_entries`), with a
# cluster at ~16s; 45s leaves ~20% headroom above today's worst
# case. The target is 1s — tighten as the backlog clears.
slow-timeout = { period = "45s", terminate-after = 1 }

# Diagnostic profile used by `bin/test --audit`. No termination —
# tests run to completion so their actual wall-clock durations
# surface in the PASS/FAIL lines nextest emits at the end of each
# test. Period is set high enough that SLOW warnings during the
# run stay rare; any test exceeding 60s is a different class of
# problem that warrants its own investigation.
#
# This profile is NOT selectable for regular CI — only `bin/test
# --audit` passes `--profile audit` to nextest.
[profile.audit]
slow-timeout = { period = "60s" }

# Concurrency tests in `tests/concurrency.rs` share filesystem state
# across threads (tempdir-scoped queues, log files, per-branch state
# files). Running more than one concurrency test at a time inside the
# `flow-rs::concurrency` binary creates unrelated contention on
# tempdir creation, git init, and subprocess fork/exec. Two of the
# tests — `log_append_under_contention` and `cleanup_isolation` —
# still spawn `flow-rs` subprocesses (for `log` and `cleanup`
# respectively) and under heavy parallelism those subprocess startups
# compete for the kernel fork/exec lock. Pin the whole binary to
# single-threaded execution so these tests run one at a time.
#
# The two lock tests in this file (`start_lock_serialization` and
# `thundering_herd_zero_delay`) were converted in PR #1166 to call
# `acquire_with_wait()` and `release()` from
# `flow_rs::commands::start_lock` directly, eliminating fork/exec
# contention from the lock path. The serialization group remains
# correct and necessary for the other tests.

[[profile.default.overrides]]
filter = "binary_id(flow-rs::concurrency)"
test-group = "serial-concurrency"

[test-groups.serial-concurrency]
max-threads = 1
