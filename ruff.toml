line-length = 120

[lint]
select = ["E", "F", "W", "I"]

[lint.per-file-ignores]
# Every lib/*.py and tests/*.py file uses sys.path.insert() before
# importing local modules from flow_utils. This is the standard
# pattern for scripts that are not installed as packages.
"lib/*.py" = ["E402"]
"tests/*.py" = ["E402"]

[format]
line-length = 120
